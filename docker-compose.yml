services:

  # =========================
  # HireFlux Spring Boot App
  # =========================
  hireflux-app:
    image: sabarnobiswas2002/hireflux:v0.0.1-SNAPSHOT
    container_name: hireflux-app

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

    environment:
      # =========================
      # ACTUATOR
      # =========================
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      # =========================
      # DATABASE
      # =========================
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      # =========================
      # JPA
      # =========================
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: false

      # =========================
      # REDIS
      # =========================
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}

      # =========================
      # KAFKA
      # =========================
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      # =========================
      # ELASTICSEARCH
      # =========================
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200

      # =========================
      # AWS S3
      # =========================
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET_NAME}

      # =========================
      # MAIL
      # =========================
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}

      # =========================
      # GOOGLE OAUTH
      # =========================
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

    networks:
      - hireflux-network

  # =========================
  # PostgreSQL
  # =========================
  postgres:
    image: postgres:16
    container_name: hireflux-postgres

    restart: always

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - hireflux-network

  # =========================
  # Redis
  # =========================
  redis:
    image: redis:7
    container_name: hireflux-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    networks:
      - hireflux-network

  # =========================
  # Kafka
  # =========================
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka

    ports:
      - "9092:9092"

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - hireflux-network

  # =========================
  # Elasticsearch
  # =========================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.8
    container_name: hireflux-elasticsearch

    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"

    ports:
      - "9200:9200"

    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

    networks:
      - hireflux-network

  # =========================
  # Kibana
  # =========================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.18.8
    container_name: hireflux-kibana

    depends_on:
      elasticsearch:
        condition: service_healthy

    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

    ports:
      - "5601:5601"

    networks:
      - hireflux-network

  # =========================
  # Prometheus
  # =========================
  prometheus:
    image: prom/prometheus
    container_name: hireflux-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus.yml

    networks:
      - hireflux-network

  # =========================
  # Grafana
  # =========================
  grafana:
    image: grafana/grafana
    container_name: hireflux-grafana

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    networks:
      - hireflux-network

# =========================
# Networks
# =========================
networks:
  hireflux-network:
    driver: bridge

# =========================
# Volumes
# =========================
volumes:
  postgres_data:
  redis_data:
  kafka-data:
  elasticsearch_data:
  grafana_data: